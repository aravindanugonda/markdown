{% extends "layout.html" %}

{% block content %}
<div class="sidebar">
    <div class="sidebar-section">
        <h2>Chats</h2>
        <div class="session-list" id="sessionList"></div>
        <div class="session-input">
            <input type="text" id="newSessionInput" placeholder="New chat…" />
            <button id="newSessionBtn">+</button>
        </div>
    </div>

    <div class="sidebar-section">
        <h3>Memory</h3>
        <div id="memoryFacts" class="memory-facts"></div>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <button id="editMemoryBtn" style="flex: 1;">Edit</button>
            <button id="forgetMemoryBtn" style="flex: 1;">Clear</button>
        </div>
        <label for="ignoreMemoryCheckbox" style="display: flex; align-items: center; gap: 8px; margin: 0; font-size: 12px; color: var(--text-secondary);">
            <input type="checkbox" id="ignoreMemoryCheckbox" style="margin: 0; cursor: pointer;" />
            <span>Ignore Memory</span>
        </label>
    </div>
</div>

<!-- Memory Edit Modal -->
<div id="memoryModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Memory</h2>
            <button class="modal-close" onclick="closeMemoryModal()">✕</button>
        </div>
        <div class="modal-body">
            <textarea id="memoryEditor" placeholder="Enter facts, one per line..." style="width: 100%; height: 400px; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-family: monospace; font-size: 12px; resize: none;"></textarea>
        </div>
        <div class="modal-footer">
            <button onclick="closeMemoryModal()" style="flex: 1;">Cancel</button>
            <button id="saveMemoryBtn" onclick="saveMemoryEdits()" style="flex: 1; background: var(--message-user); color: white; border: none;">Save</button>
        </div>
    </div>

</div>

<div class="main-container">
    <div class="toolbar">
        <div class="session-indicator">
            <span class="session-label">Session:</span>
            <span class="session-name" id="currentSessionName">session</span>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group">
            <label>Model</label>
            <select id="modelSelect">
                <option value="m">Minimax M2.5</option>
                <option value="g">Gemma4 31B</option>
            </select>
        </div>

        <div class="toolbar-actions">
            <label for="attachmentInput" class="toolbar-btn">
                Attach
                <input type="file" id="attachmentInput" accept=".txt,.md,.py,.js,.json,.yaml,.html,.css" />
            </label>
            <span id="attachmentName" class="attachment-info"></span>
            <button id="exportBtn" class="toolbar-btn">Export</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <div class="empty-state-text">Start a conversation or load an existing chat</div>
        </div>
    </div>

    <div class="input-area">
        <textarea id="messageInput" placeholder="Message…" style="height: 40px;"></textarea>
        <button id="sendBtn">Send</button>
    </div>
</div>
{% endblock %}
